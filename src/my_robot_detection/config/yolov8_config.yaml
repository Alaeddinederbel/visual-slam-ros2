# Fichier: ~/ros2_ws/src/my_robot_detection/config/yolov8_config.yaml

# Configuration YOLOv8 pour robot autonome
yolov8_node:
  ros__parameters:
    # Modèle YOLOv8 à utiliser
    model_path: "yolov8n.pt"  # Options: yolov8n.pt, yolov8s.pt, yolov8m.pt, yolov8l.pt, yolov8x.pt
    
    # Seuils de détection
    confidence_threshold: 0.5
    iou_threshold: 0.45
    
    # Topics ROS
    input_topic_left: "/camera/left/left_camera/image_raw"
    input_topic_right: "/camera/right/right_camera/image_raw"  # Pour future utilisation stéréo
    output_topic: "/yolov8/detections"
    visualization_topic: "/yolov8/visualization"
    
    # Configuration des logs
    logging:
      enable_json_log: true
      enable_csv_log: true
      enable_summary_log: true
      log_directory: "logs"  # Relatif au package
      summary_update_interval: 30.0  # secondes
    
    # Classes d'objets à détecter (COCO classes par défaut)
    target_classes:
      - "person"
      - "bicycle"
      - "car"
      - "motorcycle"
      - "airplane"
      - "bus"
      - "train"
      - "truck"
      - "boat"
      - "traffic light"
      - "fire hydrant"
      - "stop sign"
      - "parking meter"
      - "bench"
      - "bird"
      - "cat"
      - "dog"
      - "horse"
      - "sheep"
      - "cow"
      - "elephant"
      - "bear"
      - "zebra"
      - "giraffe"
      - "backpack"
      - "umbrella"
      - "handbag"
      - "tie"
      - "suitcase"
      - "frisbee"
      - "skis"
      - "snowboard"
      - "sports ball"
      - "kite"
      - "baseball bat"
      - "baseball glove"
      - "skateboard"
      - "surfboard"
      - "tennis racket"
      - "bottle"
      - "wine glass"
      - "cup"
      - "fork"
      - "knife"
      - "spoon"
      - "bowl"
      - "banana"
      - "apple"
      - "sandwich"
      - "orange"
      - "broccoli"
      - "carrot"
      - "hot dog"
      - "pizza"
      - "donut"
      - "cake"
      - "chair"
      - "couch"
      - "potted plant"
      - "bed"
      - "dining table"
      - "toilet"
      - "tv"
      - "laptop"
      - "mouse"
      - "remote"
      - "keyboard"
      - "cell phone"
      - "microwave"
      - "oven"
      - "toaster"
      - "sink"
      - "refrigerator"
      - "book"
      - "clock"
      - "vase"
      - "scissors"
      - "teddy bear"
      - "hair drier"
      - "toothbrush"
    
    # Configuration de la visualisation
    visualization:
      draw_bounding_boxes: true
      draw_labels: true
      draw_confidence: true
      box_color: [0, 255, 0]  # Vert en BGR
      text_color: [0, 0, 0]   # Noir en BGR
      box_thickness: 2
      font_scale: 0.5
    
    # Configuration de performance
    performance:
      max_fps: 30.0
      image_resize_factor: 1.0  # 1.0 = taille originale
      enable_gpu: true
      batch_size: 1