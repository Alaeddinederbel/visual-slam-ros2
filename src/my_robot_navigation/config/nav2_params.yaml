# NAV2 CONFIGURATION CORRIGÉE - Anti-oscillation et navigation stable

# BT NAVIGATOR - Configuration renforcée
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom  # ⚠️ CHANGÉ: utiliser /odom au lieu de /transformed_odom
    bt_loop_duration: 10
    default_server_timeout: 20
    action_server_result_timeout: 900.0
    transform_tolerance: 0.3  # ⚠️ Plus tolérant pour éviter les blocages
    
    goal_blackboard_id: "goal"
    path_blackboard_id: "path"
    enable_dynamic_params: True
    
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"

# CONTROLLER SERVER - Configuration anti-oscillation RENFORCÉE
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0  # ⚠️ Augmenté pour plus de réactivité
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.8  # ⚠️ Plus tolérant
    transform_tolerance: 0.3  # ⚠️ Plus tolérant
    
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2  # ⚠️ Plus large pour éviter faux positifs
      movement_time_allowance: 10.0  # ⚠️ Plus long
    
    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.4  # ⚠️ Encore plus tolérant
      yaw_goal_tolerance: 0.8  # ⚠️ Très tolérant
      stateful: True
    
    controller_plugins: ["FollowPath"]
    
    # DWB CONTROLLER - Configuration ANTI-OSCILLATION MAXIMALE
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False  # ⚠️ Désactivé pour performance
      
      # Vitesses encore plus conservatrices
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.25  # ⚠️ Encore plus réduit
      max_vel_y: 0.0
      max_vel_theta: 0.5  # ⚠️ Encore plus réduit
      min_speed_xy: 0.03
      max_speed_xy: 0.25
      min_speed_theta: 0.03
      
      # Accélérations très douces
      acc_lim_x: 0.5  # ⚠️ Réduit pour plus de douceur
      acc_lim_y: 0.0
      acc_lim_theta: 0.8  # ⚠️ Réduit
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -0.8
      
      # Échantillonnage minimal pour éviter confusion
      vx_samples: 5  # ⚠️ Réduit encore
      vy_samples: 1
      vtheta_samples: 5  # ⚠️ Réduit encore
      sim_time: 3.0  # ⚠️ Plus long pour meilleure prédiction
      discretize_by_time: False
      
      # Critics ULTRA-SIMPLIFIÉS avec priorité absolue au chemin
      critics: [
        "RotateToGoal",     # ⚠️ AJOUTÉ: pour orienter vers l'objectif
        "PathDist",
        "GoalDist",
        "BaseObstacle",
        "Oscillation"
      ]
      
      # Rotation vers l'objectif en priorité
      RotateToGoal:
        scale: 100.0      # ⚠️ NOUVEAU: priorité maximale
        slowing_factor: 2.0
        lookahead_time: -1.0
        
      # Suivi de chemin prioritaire
      PathDist:
        scale: 80.0       # ⚠️ Augmenté encore
        
      GoalDist:
        scale: 40.0       # ⚠️ Augmenté
        
      BaseObstacle:
        scale: 0.005      # ⚠️ Encore plus faible
        sum_scores: False
        
      # Anti-oscillation MAXIMAL
      Oscillation:
        scale: 100.0      # ⚠️ MAXIMUM pour empêcher va-et-vient
        oscillation_reset_dist: 0.5   # ⚠️ Plus large
        oscillation_reset_angle: 1.0  # ⚠️ Plus tolérant
        oscillation_reset_time: 3.0   # ⚠️ Plus long

# PLANNER SERVER - Chemins plus directs
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    transform_tolerance: 0.3  # ⚠️ Plus tolérant
    planner_plugins: ["GridBased"]
    
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.8      # ⚠️ Plus tolérant
      use_astar: True     # ⚠️ A* pour chemins plus directs
      allow_unknown: True
      cost_factor: 2.0    # ⚠️ Réduit pour chemins plus directs

# BEHAVIOR SERVER - Comportements simplifiés
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    transform_tolerance: 0.3  # ⚠️ Plus tolérant
    global_frame: map
    robot_base_frame: base_footprint
    use_sim_time: True
    
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    
    spin:
      plugin: "nav2_behaviors/Spin"
      simulate_ahead_time: 2.0
      max_rotational_vel: 0.5  # ⚠️ Réduit pour éviter oscillations
      min_rotational_vel: 0.2
      rotational_acc_lim: 1.5  # ⚠️ Plus doux
      
    backup:
      plugin: "nav2_behaviors/BackUp"
      backup_dist: -0.2
      backup_speed: 0.03  # ⚠️ Plus lent
      time_allowance: 15.0  # ⚠️ Plus de temps
      simulate_ahead_time: 2.0
      
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      simulate_ahead_time: 2.0
      max_linear_vel: 0.3   # ⚠️ Réduit
      min_linear_vel: 0.03
      max_angular_vel: 0.5  # ⚠️ Réduit
      min_angular_vel: 0.1
      
    wait:
      plugin: "nav2_behaviors/Wait"

# VELOCITY SMOOTHER - Lissage renforcé
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: True     # ⚠️ Activé pour plus de contrôle
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 0.6]    # ⚠️ Très réduit
    min_velocity: [-0.2, 0.0, -0.6]
    max_accel: [0.8, 0.0, 1.2]       # ⚠️ Très doux
    max_decel: [-0.8, 0.0, -1.2]
    odom_topic: "odom"       # ⚠️ CHANGÉ: /odom au lieu de transformed_odom
    odom_duration: 0.2       # ⚠️ Plus long pour stabilité
    deadband_velocity: [0.01, 0.0, 0.01]  # ⚠️ Seuils pour éviter micro-mouvements
    velocity_timeout: 2.0    # ⚠️ Plus long

# COSTMAPS - Configuration ultra-stable
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 3.0    # ⚠️ Encore plus lent pour stabilité
      publish_frequency: 1.0   # ⚠️ Réduit
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: True
      transform_tolerance: 0.3  # ⚠️ Plus tolérant
      rolling_window: True
      width: 4    # ⚠️ Légèrement augmenté pour plus de contexte
      height: 4
      resolution: 0.1  # ⚠️ Plus grossier pour stabilité
      robot_radius: 0.25  # ⚠️ Légèrement augmenté pour sécurité
      plugins: ["voxel_layer", "inflation_layer"]
      
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.1  # ⚠️ Plus grossier
        z_voxels: 10       # ⚠️ Réduit
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0  # ⚠️ Réduit
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0  # ⚠️ Réduit
          obstacle_min_range: 0.0
          inf_is_valid: False
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0    # ⚠️ Réduit pour plus de liberté
        inflation_radius: 0.6       # ⚠️ Légèrement augmenté
        inflate_unknown: False
        inflate_around_unknown: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 0.5  # ⚠️ Très lent pour stabilité
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: True
      transform_tolerance: 0.3  # ⚠️ Plus tolérant
      robot_radius: 0.25
      resolution: 0.1  # ⚠️ Plus grossier
      track_unknown_space: True
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.0
          inf_is_valid: False
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.6
        inflate_unknown: False
        inflate_around_unknown: True

# MAP SERVER
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "my_carte.yaml"

# SMOOTHER SERVER
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-8   # ⚠️ Plus tolérant
      max_its: 500       # ⚠️ Réduit pour éviter suroptimisation
      do_refinement: False  # ⚠️ Désactivé pour simplicité

# WAYPOINT FOLLOWER
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 10  # ⚠️ Réduit
    stop_on_failure: False
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 0

# LIFECYCLE MANAGER
lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True
    bond_timeout: 8.0  # ⚠️ Plus long pour éviter timeouts
    attempt_respawn_reconnection: True
    node_names: [
      'controller_server',
      'smoother_server', 
      'planner_server',
      'behavior_server',
      'bt_navigator',
      'waypoint_follower',
      'velocity_smoother'
    ]